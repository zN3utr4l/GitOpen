name: gitopen
description: "Cross-platform desktop git client"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Window chrome (chromeless + native drag/resize)
  bitsdojo_window: ^0.1.6

  # Git operations: all read+write via the user's `git` CLI.
  # libgit2dart was the original plan but is discontinued; using the
  # CLI is reliable and matches what GitHub Desktop / GitKraken do
  # for write paths anyway. Process management uses dart:io directly.

  # Persistence
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.26
  path_provider: ^2.1.5
  path: ^1.9.1

  # Logging
  logger: ^2.5.0

  # Value equality
  equatable: ^2.0.7

  # Utilities
  collection: ^1.19.0
  intl: ^0.20.0
  file_selector: ^1.1.0
  url_launcher: ^6.3.2
  http: ^1.6.0
  win32: ^5.15.0
  ffi: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Drift codegen
  drift_dev: ^2.21.0
  build_runner: ^2.4.13
  msix: ^3.16.13

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

msix_config:
  display_name: GitOpen
  publisher_display_name: s.porta
  identity_name: com.gitopen.desktop
  msix_version: 1.0.0.0
  logo_path: assets/icon/app_icon.png
  start_menu_icon_path: assets/icon/app_icon.png
  tile_icon_path: assets/icon/app_icon.png
  install_certificate: false
  store: false
  capabilities: 'internetClient'
  output_path: build/windows/x64/runner/Release
  output_name: gitopen
