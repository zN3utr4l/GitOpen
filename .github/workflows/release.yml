name: Release
on:
  push:
    tags: ['v*.*.*']
  # Allow manual trigger for testing without cutting a tag.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Derive version from tag
        id: ver
        shell: pwsh
        run: |
          $ref = "${{ github.ref_name }}"
          if ($ref -match '^v\d+\.\d+\.\d+') {
            $v = $ref -replace '^v',''
          } else {
            $v = (Select-String -Path pubspec.yaml -Pattern '^version:').Line `
                 -replace '^version:\s*','' -replace '\+.*$',''
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Building version $v"

      - name: Pub get
        run: flutter pub get

      - name: Codegen
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Flutter (Windows)
        run: flutter build windows --release

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            choco install innosetup -y --no-progress
            $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          }
          & $iscc /DAppVersion=${{ steps.ver.outputs.version }} `
                  installer\windows\gitopen.iss
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup failed: $LASTEXITCODE" }

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build/installer/GitOpen-Setup-*.exe

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/installer/GitOpen-Setup-*.exe
          generate_release_notes: true

  linux-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Derive version from tag
        id: ver
        run: |
          if [[ "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            v="${GITHUB_REF_NAME#v}"
          else
            v=$(awk '/^version:/{print $2}' pubspec.yaml | cut -d+ -f1)
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Building version $v"

      - name: Install Linux desktop deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libgtk-3-dev \
            liblzma-dev \
            libstdc++-12-dev \
            dpkg-dev

      - name: Pub get
        run: flutter pub get

      - name: Codegen
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build .deb
        run: ./scripts/build-deb.sh ${{ steps.ver.outputs.version }}

      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: build/gitopen_*_amd64.deb

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/gitopen_*_amd64.deb
          generate_release_notes: true
