name: CI GitOpen

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    # Single-OS matrix on purpose. The suite is platform-agnostic Dart + the
    # git CLI, and Linux runs it much faster than Windows (process spawn + I/O
    # for the many real-git fixture tests). Windows-specific code is compiled
    # and exercised by CD's native build, so one OS is enough for the PR gate.
    # Kept as a matrix (not a plain job) so the required check name stays
    # "build-and-test (ubuntu-latest)", and the per-step `if: ubuntu-latest`
    # guards below keep re-adding Windows a one-line change.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      # First-party (`actions/*`) actions stay on a major-version tag.
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Linux desktop deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libgtk-3-dev \
            liblzma-dev \
            libstdc++-12-dev

      # Shared setup (Flutter + pub get + cached codegen) — see
      # .github/actions/flutter-setup.
      - name: Flutter setup
        uses: ./.github/actions/flutter-setup

      # Static analysis is platform-independent — run once on Linux instead of
      # on every matrix OS (trims the slower Windows job).
      - name: Analyze
        if: matrix.os == 'ubuntu-latest'
        run: flutter analyze

      - name: Test
        shell: bash
        # `flutter test` prints a non-JSON "Resolving dependencies…" preamble to
        # stdout; keep only JSON event lines so the reporter can parse it. GitHub
        # runs bash with `pipefail`, so a real test failure still fails the step.
        run: flutter test --machine --coverage | grep '^{' > test-results.json

      - name: Publish test results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always()
        with:
          name: 'GitOpen Tests (${{ matrix.os }})'
          path: 'test-results.json'
          reporter: 'flutter-json'

      # Coverage tooling runs on Linux only: CodeCoverageSummary is a Docker
      # action and one report per PR is enough. Generated *.g.dart is excluded
      # so the number reflects hand-written code.
      - name: Convert coverage to Cobertura
        if: matrix.os == 'ubuntu-latest'
        run: |
          pip install lcov_cobertura
          # Drop generated files from coverage (lcov_cobertura --excludes matches
          # the dotted package, not the filename, so filter the lcov directly).
          awk '/^SF:/{skip = ($0 ~ /\.g\.dart/)} !skip' coverage/lcov.info > coverage/lcov.clean.info
          lcov_cobertura coverage/lcov.clean.info -o coverage/cobertura.xml

      - name: Code coverage summary
        if: matrix.os == 'ubuntu-latest'
        uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95 # v1.3.0
        with:
          filename: 'coverage/cobertura.xml'
          badge: true
          fail_below_min: false
          format: 'markdown'
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: 'both'
          # Thresholds: <good below>/<acceptable below>. Informational only —
          # set fail_below_min=true once a baseline is established.
          thresholds: '50 75'

      - name: Add coverage comment to PR
        if: matrix.os == 'ubuntu-latest' && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          recreate: true
          path: code-coverage-results.md

      # Mirrors the NE.* "check vulnerable packages" step: scan pubspec.lock
      # against the OSV database. Informational (continue-on-error); Linux-only.
      - name: Scan dependencies for vulnerabilities
        if: matrix.os == 'ubuntu-latest'
        continue-on-error: true
        run: |
          curl -sSfL -o osv-scanner \
            https://github.com/google/osv-scanner/releases/download/v2.3.8/osv-scanner_linux_amd64
          chmod +x osv-scanner
          ./osv-scanner scan source --lockfile=pubspec.lock
